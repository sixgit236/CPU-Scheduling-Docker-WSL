version: '3.8'
services:
 database:
 image: mysql:8.0
 container_name: sidne_database_1
 environment:
 MYSQL_ROOT_PASSWORD: root_password
 MYSQL_DATABASE: scheduling_db
 volumes:
 - mysql_data:/var/lib/mysql
 web_app:
 build: .
 container_name: sidne_web_1
 ports:
 - "5000:5000"
 environment:
 DB_HOST: database
 DB_USER: root
 DB_PASSWORD: root_password
 DB_NAME: scheduling_db
 depends_on:

